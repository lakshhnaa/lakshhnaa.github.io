identity:
    # Site name - shown in navbar, footer, copyright, and browser title by default
    name: "Lakshnaa"
    # Legal entity for copyright notices
    organization: "Lakshnaa"
    # Schema.org type for structured data
    type: person 
    # Short tagline displayed on your site
    tagline: "Systems & Intelligence Optimization Engineer"
    # Site meta description for search engines
    description: "Systems & Intelligence Optimization Engineer portfolio specializing in math modeling, deep learning mechanics, and hardware simulation."
    theme:
    # Mode: 'light', 'dark', or 'system'
    mode: dark
    # Theme pack: name from data/themes/
    pack: "minimal"
    content:
    # Math rendering
    math:
      enable: true
    header:
    enable: true
    style: navbar 
    sticky: true
    align: right # Aligns links cleanly to the right side
    # Feature toggles
    search: false
    theme_toggle: false
    theme_picker: false
    language_switcher: false
